<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>🦦 Goldy</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Satisfy&family=Nunito:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1);
        font-family: "Nunito", sans-serif;
        -webkit-tap-highlight-color: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* --- Envelope --- */
      #closed {
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
        width: 280px;
      }

      #closed:active {
        opacity: 0.9;
      }

      #closed svg {
        display: block;
        width: 100%;
        filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.12));
      }

      .env-text {
        text-anchor: middle;
        font-family: "Satisfy", cursive;
        font-size: 18px;
        fill: #5d4037;
      }

      .env-emoji {
        text-anchor: middle;
        font-size: 30px;
      }

      /* --- Letter --- */
      #opened {
        display: none;
        text-align: center;
        background: white;
        border-radius: 12px;
        padding: 2.5rem 2rem;
        width: 300px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
        animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      #opened h1 {
        font-family: "Satisfy", cursive;
        font-size: 2rem;
        color: #006064;
        margin-bottom: 1rem;
        line-height: 1.4;
      }

      #opened p {
        font-size: 1.1rem;
        color: #00838f;
        line-height: 1.6;
        margin-bottom: 0.5rem;
      }

      #opened .signature {
        font-family: "Satisfy", cursive;
        font-size: 1.5rem;
        color: #00695c;
        margin-top: 1rem;
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.7);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>

  <body>
    <div id="closed">
      <svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Body with rounded bottom -->
        <path
          d="M0,0 H280 V220 Q280,240 260,240 H20 Q0,240 0,220 Z"
          fill="#f5f0e8"
        />
        <!-- Flap -->
        <polygon points="0,0 140,90 280,0" fill="#ede7db" />
        <!-- Seal -->
        <text x="140" y="135" class="env-emoji">🦦</text>
        <!-- Label -->
        <text x="140" y="175" class="env-text">Ouvre-moi !</text>
      </svg>
    </div>

    <div id="opened">
      <h1>Bonne fin de journée ma Loutre 🦦</h1>
      <p>Prends soin de toi et profite de ton week-end</p>
      <p class="signature">À très vite ✨</p>
    </div>

    <script>
      document.getElementById("closed").addEventListener("click", () => {
        document.getElementById("closed").style.display = "none";
        document.getElementById("opened").style.display = "block";
      });
    </script>
  </body>
</html>
